description: >-
  Anixter International was a leading global distributor of network and security
  solutions, electrical and electronic solutions, and utility power solutions.
  In June 2020, Anixter was acquired by Wesco International for approximately
  $4.5 billion, creating a combined company with over $17 billion in annual
  revenue. Anixter now operates as Wesco Anixter, providing B2B distribution,
  supply chain services, and digital integration capabilities including EDI,
  punchout catalogs, and procurement system integrations.
